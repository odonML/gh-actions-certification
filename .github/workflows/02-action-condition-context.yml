name: Conditional context action

on:
  push:
    branches: [main]

jobs:
  print-hola-mundo:
    runs-on: ubuntu-latest
    steps:
      - run: echo "hola mundo"

  print-hola:
    if: ${{ github.ref == 'refs/heads/develop' }}
    runs-on: ubuntu-latest
    needs: print-hola-mundo
    steps:
      - run: echo "hola"








