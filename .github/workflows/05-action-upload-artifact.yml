name: 05 Action upload artifact
on:
  push:
    branches: [main]

jobs:
    upload-artifact:
        runs-on: ubuntu-latest
        steps:
            - name: Create a file
              run: echo "Test Hola Mundo" >> test.log

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: my-artifact
                path: test.log

    download-artifact:
        runs-on: ubuntu-latest
        needs: upload-artifact
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                name: my-artifact

            - name: Print artifact content
              run: cat test.log